name: Construire l’APK Android

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-apk.yml'
      - 'android-app/**'
      - 'index.html'
      - '*.css'
      - '*.js'
      - 'manifest.webmanifest'
      - 'icons/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/build-apk.yml'
      - 'android-app/**'
      - 'index.html'
      - '*.css'
      - '*.js'
      - 'manifest.webmanifest'
      - 'icons/**'

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le projet
        uses: actions/checkout@v4

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Installer Android SDK
        uses: android-actions/setup-android@v3

      - name: Installer Android 35
        run: sdkmanager 'platforms;android-35' 'build-tools;35.0.0'

      - name: Installer Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Intégrer toute l’application dans l’APK
        shell: bash
        run: |
          set -euo pipefail
          DEST='android-app/app/src/main/assets/www'
          rm -rf "$DEST"
          mkdir -p "$DEST/icons"
          cp index.html styles.css table-templates.css journal-grid.css progress-tracker.css install-app.css "$DEST/"
          cp app.js data.js table-pills.js journal-grid.js progress-tracker.js install-app.js sw.js "$DEST/"
          cp manifest.webmanifest "$DEST/"
          for number in $(seq 1 19); do cp "theme${number}.js" "$DEST/"; done
          cp icons/* "$DEST/icons/"
          sed -i '/install-app.css/d;/install-app.js/d' "$DEST/index.html"

      - name: Construire l’APK
        run: gradle -p android-app assembleDebug --no-daemon --stacktrace

      - name: Préparer le fichier téléchargeable
        run: cp android-app/app/build/outputs/apk/debug/app-debug.apk Comptabilite-DGFiP.apk

      - name: Publier l’APK
        uses: actions/upload-artifact@v4
        with:
          name: Comptabilite-DGFiP-APK
          path: Comptabilite-DGFiP.apk
          if-no-files-found: error
          retention-days: 30
