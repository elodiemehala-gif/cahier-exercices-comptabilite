<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#07111f">
  <meta name="description" content="Cahier d’exercices de comptabilité générale">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="table-templates.css">
  <title>Comptabilité — Cahier d’exercices</title>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-icon" aria-hidden="true">▥</div>
      <div>
        <p class="eyebrow">RÉVISION COMPTABLE</p>
        <h1>Comptabilité</h1>
        <p class="tagline">Révise mieux. Comprends plus vite. Progresse durablement.</p>
      </div>
    </div>
    <div class="header-actions">
      <button id="themeToggle" class="theme-toggle" type="button" aria-label="Changer de thème">☾ <span>Thème</span></button>
      <button id="installBtn" hidden>Installer</button>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="hero-copy">
        <span class="hero-kicker">PROGRESSION GLOBALE</span>
        <strong id="progressText">0 sujet terminé sur 81</strong>
        <div class="bar"><span id="progressBar"></span></div>
      </div>
      <div class="hero-orbit" aria-hidden="true"><span>81</span><small>sujets</small></div>
      <button id="resetBtn" class="ghost">Réinitialiser</button>
    </section>
    <section id="app" aria-live="polite"></section>
  </main>

  <script src="data.js"></script>
  <script src="theme1.js"></script><script src="theme2.js"></script><script src="theme3.js"></script><script src="theme4.js"></script><script src="theme5.js"></script><script src="theme6.js"></script><script src="theme7.js"></script><script src="theme8.js"></script><script src="theme9.js"></script><script src="theme10.js"></script><script src="theme11.js"></script><script src="theme12.js"></script><script src="theme13.js"></script><script src="theme14.js"></script><script src="theme15.js"></script><script src="theme16.js"></script><script src="theme17.js"></script><script src="theme18.js"></script><script src="theme19.js"></script>
  <script src="app.js"></script>
</body>
</html>
